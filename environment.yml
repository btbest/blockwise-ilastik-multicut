name: blockwise-mc
channels:
  - ilastik-forge/label/patched-2
  - ilastik-forge
  - conda-forge
  - nodefaults
dependencies:
  - python
  - numpy>=1
  - ilastikrag>=0.1.4
  - vigra=1.12.1
  - nifty
  - affogato
  - scikit-learn<=1.6.1
  - scikit-image
  - h5py
  - zarr>=2,<4
  - fsspec
  - aiohttp
  - pandas>=2
  - tqdm
  - numba
  - pytest
  - pip
  - python-elf
  - requests
  - pip:
    # Override the conda-forge python-elf with the local patched version.
    # The conda-forge 0.7.4 release has a bug in blockwise_mc_impl where
    # n_new_nodes is sized from edge endpoints only, missing isolated nodes.
    - --no-deps ./libs/elf@b58e4c83
